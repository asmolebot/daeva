name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (for example v0.2.0)'
        required: true
        type: string

jobs:
  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.ref_name }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Validate release tag format
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "RELEASE_TAG must start with v (got: $RELEASE_TAG)" >&2; exit 1 ;;
          esac

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Release checks (typecheck + build + test + pack dry-run)
        run: bash scripts/release-check.sh

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" --generate-notes --title "$RELEASE_TAG"

      - name: Publish to npm if token exists
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set, skipping npm publish"
            exit 0
          fi
          npm publish --provenance --access public

      - name: Install ClaWHub CLI if token exists
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set, skipping ClaWHub install"
            exit 0
          fi
          npm i -g clawhub

      - name: Publish skill to ClaWHub if token exists
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set, skipping ClaWHub publish"
            exit 0
          fi
          VERSION="${RELEASE_TAG#v}"
          clawhub skill publish ./skills/openclaw \
            --slug daeva \
            --name "Daeva" \
            --version "$VERSION" \
            --changelog "Release $RELEASE_TAG" \
            --tags latest \
            --no-input
