name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Release checks (typecheck + build + test + pack dry-run)
        run: bash scripts/release-check.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install ClaWHub CLI
        if: ${{ secrets.CLAWHUB_TOKEN != '' }}
        run: npm i -g clawhub

      - name: Publish skill to ClaWHub
        if: ${{ secrets.CLAWHUB_TOKEN != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          clawhub skill publish ./skills/openclaw \
            --slug daeva \
            --name "Daeva" \
            --version "$VERSION" \
            --changelog "Release $GITHUB_REF_NAME" \
            --tags latest \
            --no-input
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
